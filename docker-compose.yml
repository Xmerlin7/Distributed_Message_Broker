version: "3.8"

services:
  load_balancer:
    image: nginx:latest
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    restart: on-failure
    depends_on:
      - app_server_1
      - app_server_2

  app_server_1:
    build: .
    command: node producer.js
    depends_on:
      broker:
        condition: service_healthy

  app_server_2:
    build: .
    command: node producer.js
    depends_on:
      broker:
        condition: service_healthy

  broker:
    image: rabbitmq:3-management
    ports:
      - "15672:15672"
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "check_port_connectivity"]
      interval: 5s
      timeout: 5s
      retries: 15
      start_period: 20s

  background_worker:
    build: .
    command: node consumer.js
    restart: on-failure          # safety net if broker is slow
    depends_on:
      broker:
        condition: service_healthy